version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
  exclusions:
    max-issues-per-linter: 50
    max-same-issues: 5

formatters:
  enable:
    - gofmt
