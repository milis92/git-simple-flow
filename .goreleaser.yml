version: 2

project_name: git-sf

builds:
  - main: .
    binary: git-sf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - package_name: git-sf
    vendor: milis92
    homepage: https://github.com/milis92/git-simple-flow
    maintainer: milis92
    description: Simple Git Flow — all the structure, none of the ceremony
    license: MIT
    formats:
      - deb
      - rpm

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
