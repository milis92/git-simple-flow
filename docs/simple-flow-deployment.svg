<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 270" width="820" height="270">
  <style>
    .label { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 12px; }
    .tag { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 10px; font-weight: 600; }
    .step { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 10px; }
    .channel { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 11px; font-weight: 600; }
    .trigger { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 9px; }
  </style>

  <defs>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="270" rx="12" fill="#0d1117"/>
  <rect width="818" height="268" x="1" y="1" rx="11" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- ===== Git timeline ===== -->

  <!-- Main branch line -->
  <line x1="40" y1="85" x2="780" y2="85" stroke="#484f58" stroke-width="3" stroke-linecap="round"/>

  <!-- Feature branch (green, above) -->
  <path d="M 140 85 C 170 85, 170 40, 200 40 L 350 40 C 380 40, 380 85, 410 85"
        stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Main beads -->
  <circle cx="60"  cy="85" r="4" fill="#6e7681"/>
  <circle cx="140" cy="85" r="5" fill="#6e7681"/>
  <circle cx="410" cy="85" r="6" fill="#3fb950" filter="url(#glow)"/>
  <circle cx="490" cy="85" r="4" fill="#6e7681"/>
  <circle cx="620" cy="85" r="7" fill="#d2a8ff" filter="url(#glow)"/>
  <circle cx="720" cy="85" r="4" fill="#6e7681"/>
  <circle cx="760" cy="85" r="3" fill="#484f58"/>

  <!-- Feature beads -->
  <circle cx="245" cy="40" r="4" fill="#3fb950" filter="url(#glow-sm)" opacity="0.9"/>
  <circle cx="310" cy="40" r="4" fill="#3fb950" filter="url(#glow-sm)" opacity="0.9"/>

  <!-- Branch labels -->
  <text x="40" y="73" class="label" fill="#6e7681">main</text>
  <text x="275" y="30" text-anchor="middle" class="label" fill="#3fb950">feature/login</text>

  <!-- v1.2.0 tag -->
  <line x1="620" y1="67" x2="620" y2="76" stroke="#d2a8ff" stroke-width="1" opacity="0.5"/>
  <rect x="595" y="47" width="50" height="20" rx="10" fill="#d2a8ff" opacity="0.12" stroke="#d2a8ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="620" y="61" text-anchor="middle" class="tag" fill="#d2a8ff">v1.2.0</text>

  <!-- ===== Trigger arrows anchored to specific beads ===== -->

  <!-- Dev: from feature bead at (245, 40) straight down through main to badge -->
  <line x1="245" y1="44" x2="245" y2="165" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="240,163 245,173 250,163" fill="#3fb950" opacity="0.6"/>

  <!-- Beta: from merge bead at (410, 85) straight down to badge -->
  <line x1="410" y1="91" x2="410" y2="165" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="405,163 410,173 415,163" fill="#e3b341" opacity="0.6"/>

  <!-- Production: from tag bead at (620, 85) straight down to badge -->
  <line x1="620" y1="92" x2="620" y2="165" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="615,163 620,173 625,163" fill="#d2a8ff" opacity="0.6"/>

  <!-- ===== Trigger labels ===== -->
  <text x="245" y="120" text-anchor="middle" class="trigger" fill="#3fb950" opacity="0.8">branch push</text>
  <text x="410" y="120" text-anchor="middle" class="trigger" fill="#e3b341" opacity="0.8">merge to main</text>
  <text x="620" y="120" text-anchor="middle" class="trigger" fill="#d2a8ff" opacity="0.8">tag push</text>

  <!-- ===== Channel badges ===== -->

  <!-- Dev badge (green) — centered at x=245 -->
  <rect x="192" y="176" width="106" height="46" rx="8" fill="#3fb950" opacity="0.08" stroke="#3fb950" stroke-width="1" stroke-opacity="0.4"/>
  <text x="245" y="197" text-anchor="middle" class="channel" fill="#3fb950">Dev</text>
  <text x="245" y="213" text-anchor="middle" class="trigger" fill="#3fb950" opacity="0.6">preview builds</text>

  <!-- Beta badge (amber) — centered at x=410 -->
  <rect x="357" y="176" width="106" height="46" rx="8" fill="#e3b341" opacity="0.08" stroke="#e3b341" stroke-width="1" stroke-opacity="0.4"/>
  <text x="410" y="197" text-anchor="middle" class="channel" fill="#e3b341">Beta</text>
  <text x="410" y="213" text-anchor="middle" class="trigger" fill="#e3b341" opacity="0.6">staging / RC</text>

  <!-- Production badge (purple) — centered at x=620 -->
  <rect x="561" y="176" width="118" height="46" rx="8" fill="#d2a8ff" opacity="0.08" stroke="#d2a8ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="620" y="197" text-anchor="middle" class="channel" fill="#d2a8ff">Production</text>
  <text x="620" y="213" text-anchor="middle" class="trigger" fill="#d2a8ff" opacity="0.6">stable release</text>

  <!-- ===== Connecting flow arrows between badges ===== -->
  <line x1="300" y1="199" x2="355" y2="199" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <polygon points="351,196 357,199 351,202" fill="#484f58" opacity="0.3"/>

  <line x1="465" y1="199" x2="559" y2="199" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <polygon points="555,196 561,199 555,202" fill="#484f58" opacity="0.3"/>

  <!-- ===== Latest → Stable spectrum ===== -->
  <text x="192" y="248" class="trigger" fill="#484f58">latest (main)</text>
  <line x1="280" y1="245" x2="595" y2="245" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <polygon points="593,243 599,245 593,247" fill="#484f58" opacity="0.3"/>
  <text x="604" y="248" class="trigger" fill="#484f58">stable (tags)</text>
</svg>
