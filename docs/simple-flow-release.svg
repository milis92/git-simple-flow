<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140">
  <style>
    .label { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 12px; }
    .tag { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 10px; font-weight: 600; }
  </style>

  <defs>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="140" rx="12" fill="#0d1117"/>
  <rect width="418" height="138" x="1" y="1" rx="11" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Main branch line -->
  <line x1="40" y1="80" x2="380" y2="80" stroke="#484f58" stroke-width="3" stroke-linecap="round"/>

  <!-- Main beads -->
  <circle cx="80"  cy="80" r="4" fill="#6e7681"/>
  <circle cx="160" cy="80" r="4" fill="#6e7681"/>
  <circle cx="240" cy="80" r="4" fill="#6e7681"/>
  <circle cx="320" cy="80" r="7" fill="#d2a8ff" filter="url(#glow)"/>

  <!-- Label -->
  <text x="40" y="68" class="label" fill="#6e7681">main</text>

  <!-- v2.0.0 tag -->
  <line x1="320" y1="62" x2="320" y2="71" stroke="#d2a8ff" stroke-width="1" opacity="0.5"/>
  <rect x="295" y="42" width="50" height="20" rx="10" fill="#d2a8ff" opacity="0.12" stroke="#d2a8ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="320" y="56" text-anchor="middle" class="tag" fill="#d2a8ff">v2.0.0</text>

  <!-- "A release is just a tag" annotation -->
  <line x1="320" y1="88" x2="320" y2="100" stroke="#484f58" stroke-width="1" opacity="0.4"/>
  <text x="320" y="115" text-anchor="middle" class="tag" fill="#484f58">release = tag on main</text>
</svg>
