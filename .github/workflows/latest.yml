name: Latest

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml
    with:
      upload-coverage: true
    secrets: inherit
  lint:
    uses: ./.github/workflows/lint.yml
  deploy:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Build snapshot
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # Snapshot builds skip system packages (deb/rpm); only tar.gz/zip archives are published
          args: release --snapshot --skip=publish,nfpm --clean
      - name: Compute beta version
        id: beta
        run: |
          # Find latest stable tag (no pre-release suffix)
          LATEST_STABLE=$(git tag -l 'v*.*.*' | grep -v '-' | sort -V | tail -1)
          if [ -z "$LATEST_STABLE" ]; then
            LATEST_STABLE="v0.0.0"
          fi

          # Parse and bump minor
          VERSION="${LATEST_STABLE#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_MINOR=$((MINOR + 1))
          BASE="v${MAJOR}.${NEXT_MINOR}.0"

          # Find highest existing beta number for this base version
          MAX_BETA=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
            | { grep "^${BASE}-beta\." || true; } \
            | sed "s/^${BASE}-beta\.//" \
            | sort -n \
            | tail -1)
          if [ -z "$MAX_BETA" ]; then
            MAX_BETA=0
          fi

          NEXT_BETA=$((MAX_BETA + 1))
          BETA_TAG="${BASE}-beta.${NEXT_BETA}"
          echo "beta_tag=${BETA_TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed next beta version: ${BETA_TAG}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create beta release
        run: |
          gh release create "${{ steps.beta.outputs.beta_tag }}" \
            dist/*.tar.gz dist/*.zip dist/checksums.txt \
            --title "${{ steps.beta.outputs.beta_tag }}" \
            --notes "Pre-release build from main." \
            --prerelease \
            --target "${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
