name: Latest

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml
    with:
      upload-coverage: true
    secrets: inherit
  lint:
    uses: ./.github/workflows/lint.yml
  deploy:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Build snapshot
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # Snapshot builds skip system packages (snap/deb/rpm); only tar.gz/zip archives are published
          args: release --snapshot --skip=publish,snapcraft,nfpm --clean
      - name: Delete existing latest release
        run: |
          if gh release view latest > /dev/null 2>&1; then
            gh release delete latest --yes --cleanup-tag
          else
            echo "No existing 'latest' release found, skipping delete."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create latest release
        run: |
          gh release create latest dist/*.tar.gz dist/*.zip dist/checksums.txt \
            --title "Latest (unstable)" \
            --notes "Rolling build from main. Not a stable release." \
            --prerelease \
            --target "${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
