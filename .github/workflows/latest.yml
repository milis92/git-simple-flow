name: Latest

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml
    with:
      upload-coverage: true
  lint:
    uses: ./.github/workflows/lint.yml
  deploy:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --skip=publish,snapcraft,nfpm --clean
      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create latest release
        run: |
          gh release create latest dist/*.tar.gz dist/*.zip dist/checksums.txt \
            --title "Latest (unstable)" \
            --notes "Rolling build from main. Not a stable release." \
            --prerelease \
            --target ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
